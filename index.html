<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momin Voice Call Pro</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        /* Your original design remains same */
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f0f0; padding: 20px; }
        .status { color: #007bff; font-weight: bold; margin-bottom: 20px; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 80%; max-width: 300px; margin-bottom: 10px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background-color: #28a745; color: white; cursor: pointer; font-size: 16px; margin: 5px; }
        .speaker-btn { background-color: #ffc107; color: black; }
    </style>
</head>
<body>

    <div id="my-id-display" class="status">Connecting to Server...</div>
    
    <input type="text" id="remote-id" placeholder="Enter Receiver ID">
    <br>
    <button onclick="makeCall()">Start Call</button>
    <button id="speaker-btn" class="speaker-btn" onclick="toggleSpeaker()">Speaker: OFF</button>
    
    <audio id="outgoing-sound" src="https://www.soundjay.com/phone/telephone-ring-03a.mp3" loop></audio>
    <audio id="incoming-ringtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>
    <audio id="remote-audio" autoplay></audio>

    <script>
        var peer = new Peer();
        var myStream;
        var isLoud = false;
        const remoteAudio = document.getElementById('remote-audio');
        const outgoingSound = document.getElementById('outgoing-sound');
        const incomingRingtone = document.getElementById('incoming-ringtone');

        peer.on('open', function(id) {
            document.getElementById('my-id-display').innerText = "Your ID: " + id;
        });

        // Cross-browser compatibility for Microphone
        navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(function(stream) {
            myStream = stream;
        }).catch(function(err) {
            console.error("Microphone Access Denied: ", err);
        });

        // Handling Incoming Call with Ringtone
        peer.on('call', function(call) {
            incomingRingtone.play();
            // In a real app, this would trigger a UI popup
            if(confirm("Incoming Call! Do you want to answer?")) {
                incomingRingtone.pause();
                incomingRingtone.currentTime = 0;
                call.answer(myStream);
                call.on('stream', function(stream) {
                    remoteAudio.srcObject = stream;
                });
            } else {
                incomingRingtone.pause();
                incomingRingtone.currentTime = 0;
            }
        });

        function makeCall() {
            var id = document.getElementById('remote-id').value;
            if(!id) return alert("Please enter an ID");
            
            outgoingSound.play();
            var call = peer.call(id, myStream);
            
            call.on('stream', function(stream) {
                outgoingSound.pause();
                outgoingSound.currentTime = 0;
                remoteAudio.srcObject = stream;
            });
        }

        // Speaker Toggle (Earpiece vs Loudspeaker Simulation)
        function toggleSpeaker() {
            isLoud = !isLoud;
            if (isLoud) {
                document.getElementById('speaker-btn').innerText = "Speaker: ON";
                remoteAudio.volume = 1.0; // Max volume
            } else {
                document.getElementById('speaker-btn').innerText = "Speaker: OFF";
                remoteAudio.volume = 0.3; // Low volume for earpiece feel
            }
        }
    </script>
</body>
</html>
