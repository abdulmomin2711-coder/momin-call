<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Momin Voice Call</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        body {
            background: #0a0e1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .card {
            background: #111725;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #2a2f45;
        }
        .badge {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: #7e8aa8;
            margin-bottom: 8px;
        }
        .id-box {
            background: #0a0e18;
            border-radius: 60px;
            padding: 12px 20px;
            display: inline-block;
            margin: 10px 0;
            border: 1px solid #2ecc71;
        }
        .id-number {
            font-size: 38px;
            font-weight: 800;
            font-family: monospace;
            color: #2ecc71;
        }
        .status {
            background: #0e1322;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 12px;
            display: inline-block;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            background: #0e1322;
            border: 1.5px solid #2a3048;
            border-radius: 60px;
            color: white;
            text-align: center;
            outline: none;
        }
        input:focus {
            border-color: #2ecc71;
        }
        button {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
        }
        .btn-call {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .incoming-card {
            background: #1e1a2f;
            border-radius: 28px;
            padding: 18px;
            margin-top: 12px;
            animation: pulse 1s infinite;
            border-left: 4px solid #f39c12;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(243,156,18,0.5); }
            70% { box-shadow: 0 0 0 15px rgba(243,156,18,0); }
            100% { box-shadow: 0 0 0 0 rgba(243,156,18,0); }
        }
        .flex-row {
            display: flex;
            gap: 12px;
            margin-top: 14px;
        }
        .flex-row button {
            margin-top: 0;
        }
        .active-call-box {
            background: #0f2a1a;
            border-radius: 28px;
            padding: 18px;
            text-align: center;
            border: 1px solid #2ecc71;
            margin-top: 12px;
        }
        .contact-item {
            background: #0e1322;
            padding: 10px 15px;
            margin: 6px 0;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .contact-name {
            color: #2ecc71;
            font-weight: 600;
        }
        .contact-id {
            font-size: 11px;
            color: #8e9bbe;
        }
        .delete-contact {
            background: #e74c3c;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 11px;
            width: auto;
            margin: 0;
        }
        .toast {
            position: fixed;
            bottom: 25px;
            left: 20px;
            right: 20px;
            background: #1e2438;
            border-radius: 60px;
            padding: 12px 20px;
            text-align: center;
            font-size: 14px;
            z-index: 1000;
        }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="badge">YOUR CALLER ID</div>
        <div class="id-box">
            <span class="id-number" id="myId">----</span>
        </div>
        <div class="status" id="statusText">Initializing...</div>
        <button id="newIdBtn" style="background:#2c3e50; margin-top:8px; padding:8px; font-size:12px;">GENERATE NEW ID</button>
    </div>

    <div class="card">
        <div class="badge">CALL A FRIEND</div>
        <input type="number" id="targetId" placeholder="Enter friend's ID">
        <button class="btn-call" id="callBtn">START VOICE CALL</button>
    </div>

    <div class="card">
        <div class="badge">SAVE CONTACT</div>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="contactName" placeholder="Name" style="width:40%; text-align:left;">
            <input type="number" id="contactIdNum" placeholder="ID" style="width:60%; text-align:left;">
        </div>
        <button id="saveContactBtn" style="background:#3498db;">SAVE CONTACT</button>
        <div class="badge" style="margin-top: 16px;">MY CONTACTS</div>
        <div id="contactsList"></div>
    </div>

    <div id="callArea"></div>
</div>

<script>
    // ========== USER ID ==========
    let myId = localStorage.getItem('momin_id');
    if (!myId) {
        myId = Math.floor(1000 + Math.random() * 9000).toString();
        localStorage.setItem('momin_id', myId);
    }
    document.getElementById('myId').innerText = myId;

    // New ID button
    document.getElementById('newIdBtn').onclick = () => {
        myId = Math.floor(1000 + Math.random() * 9000).toString();
        localStorage.setItem('momin_id', myId);
        document.getElementById('myId').innerText = myId;
        showToast("New ID: " + myId);
        if (peer) peer.destroy();
        initPeer();
    };

    // ========== CONTACTS ==========
    let contacts = JSON.parse(localStorage.getItem('momin_contacts') || '[]');
    
    function saveContacts() {
        localStorage.setItem('momin_contacts', JSON.stringify(contacts));
        renderContacts();
    }
    
    function renderContacts() {
        const container = document.getElementById('contactsList');
        if (contacts.length === 0) {
            container.innerHTML = '<div style="color:#6c7a9e; text-align:center; padding:10px;">No contacts</div>';
            return;
        }
        container.innerHTML = '';
        contacts.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'contact-item';
            div.innerHTML = `
                <div style="flex:1" onclick="selectContact('${c.id}')">
                    <div class="contact-name">${c.name}</div>
                    <div class="contact-id">ID: ${c.id}</div>
                </div>
                <button class="delete-contact" onclick="deleteContact(${i})">Del</button>
            `;
            container.appendChild(div);
        });
    }
    
    window.selectContact = (id) => {
        document.getElementById('targetId').value = id;
        showToast("Selected: " + id);
    };
    
    window.deleteContact = (idx) => {
        contacts.splice(idx, 1);
        saveContacts();
    };
    
    document.getElementById('saveContactBtn').onclick = () => {
        const name = document.getElementById('contactName').value.trim();
        const id = document.getElementById('contactIdNum').value.trim();
        if (!name || !id) { showToast("Enter both name and ID"); return; }
        if (contacts.find(c => c.id === id)) { showToast("Already exists"); return; }
        contacts.push({ name, id });
        saveContacts();
        document.getElementById('contactName').value = '';
        document.getElementById('contactIdNum').value = '';
        showToast("Contact saved!");
    };
    
    renderContacts();

    // ========== CALL VARIABLES ==========
    let peer = null;
    let localStream = null;
    let currentCall = null;
    let remoteAudio = null;
    let isInCall = false;
    let pendingCall = null;
    let ringtone = null;
    let ringInterval = null;

    function showToast(msg) {
        let old = document.querySelector('.toast');
        if(old) old.remove();
        let div = document.createElement('div');
        div.className = 'toast';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
    }

    function playRingtone() {
        stopRingtone();
        let vol = 0.1;
        ringtone = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
        ringtone.loop = true;
        ringtone.volume = vol;
        ringtone.play().catch(e => console.log);
        ringInterval = setInterval(() => {
            if (ringtone && vol < 0.5) {
                vol += 0.03;
                ringtone.volume = vol;
            }
        }, 400);
    }
    
    function stopRingtone() {
        if (ringInterval) clearInterval(ringInterval);
        if (ringtone) { ringtone.pause(); ringtone = null; }
    }

    function updateUI() {
        const area = document.getElementById('callArea');
        if (pendingCall && !isInCall) {
            area.innerHTML = `
                <div class="incoming-card">
                    <div class="badge">INCOMING CALL</div>
                    <div style="font-size: 28px; margin: 12px 0;">${pendingCall.callerId}</div>
                    <div class="flex-row">
                        <button id="acceptBtn" style="background:#2ecc71;">ACCEPT</button>
                        <button id="rejectBtn" style="background:#e74c3c;">REJECT</button>
                    </div>
                </div>
            `;
            document.getElementById('acceptBtn')?.onclick = acceptCall;
            document.getElementById('rejectBtn')?.onclick = rejectCall;
        } else if (isInCall && currentCall) {
            area.innerHTML = `
                <div class="active-call-box">
                    <div class="badge">LIVE CALL</div>
                    <div style="font-size: 20px; margin: 16px 0;">Speaking now</div>
                    <button id="hangupBtn" class="btn-danger">HANG UP</button>
                </div>
            `;
            document.getElementById('hangupBtn')?.onclick = () => hangup(true);
        } else {
            area.innerHTML = '';
        }
    }

    async function hangup(showMsg = true) {
        stopRingtone();
        if (currentCall) { try { currentCall.close(); } catch(e) {} currentCall = null; }
        if (remoteAudio) { remoteAudio.pause(); remoteAudio.srcObject = null; remoteAudio = null; }
        isInCall = false;
        pendingCall = null;
        updateUI();
        if (showMsg) showToast("Call ended");
        document.getElementById('statusText').innerHTML = "Online • Ready";
    }

    async function acceptCall() {
        if (!pendingCall) return;
        stopRingtone();
        if (!localStream) {
            try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
            catch(e) { showToast("Microphone needed"); rejectCall(); return; }
        }
        const call = pendingCall.call;
        call.answer(localStream);
        call.on('stream', (s) => {
            if (remoteAudio) remoteAudio.pause();
            const audio = new Audio();
            audio.srcObject = s;
            audio.autoplay = true;
            remoteAudio = audio;
            isInCall = true;
            currentCall = call;
            pendingCall = null;
            updateUI();
            document.getElementById('statusText').innerHTML = "On a call";
        });
        call.on('close', () => hangup(false));
    }
    
    function rejectCall() {
        if (pendingCall) { try { pendingCall.call.close(); } catch(e) {} pendingCall = null; }
        stopRingtone();
        updateUI();
        showToast("Call rejected");
    }

    async function makeCall(remoteId) {
        if (!remoteId || remoteId === myId) { showToast("Invalid ID"); return; }
        if (isInCall) { showToast("Already in a call"); return; }
        if (!peer) { showToast("Connecting..."); return; }
        if (!localStream) {
            try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
            catch(e) { showToast("Microphone access needed"); return; }
        }
        
        document.getElementById('statusText').innerHTML = "Calling...";
        const call = peer.call('momin_' + remoteId, localStream);
        currentCall = call;
        
        call.on('stream', (s) => {
            if (remoteAudio) remoteAudio.pause();
            const audio = new Audio();
            audio.srcObject = s;
            audio.autoplay = true;
            remoteAudio = audio;
            isInCall = true;
            updateUI();
            document.getElementById('statusText').innerHTML = "Connected";
            showToast("Call started!");
        });
        call.on('close', () => hangup(false));
        call.on('error', () => { hangup(true); showToast("User offline"); });
        updateUI();
        
        setTimeout(() => {
            if (currentCall && !isInCall) { hangup(false); showToast("No answer"); }
        }, 25000);
    }

    function initPeer() {
        document.getElementById('statusText').innerHTML = "Connecting...";
        if (peer) peer.destroy();
        peer = new Peer('momin_' + myId, {
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });
        peer.on('open', () => {
            document.getElementById('statusText').innerHTML = "Online • Ready";
            showToast("Connected! ID: " + myId);
        });
        peer.on('call', (call) => {
            if (isInCall) { call.close(); return; }
            if (pendingCall) { call.close(); return; }
            const callerNum = call.peer.replace('momin_', '');
            playRingtone();
            if (navigator.vibrate) navigator.vibrate(300);
            pendingCall = { call, callerId: callerNum };
            updateUI();
            document.getElementById('statusText').innerHTML = "Incoming call!";
            showToast("Call from " + callerNum);
        });
        peer.on('error', () => { document.getElementById('statusText').innerHTML = "Reconnecting..."; });
    }

    document.getElementById('callBtn').onclick = async () => {
        const target = document.getElementById('targetId').value.trim();
        if (!target) { showToast("Enter friend's ID"); return; }
        if (!localStream) {
            try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
            catch(e) { showToast("Microphone access needed"); return; }
        }
        makeCall(target);
    };

    initPeer();
    updateUI();
</script>
</body>
    </html>
