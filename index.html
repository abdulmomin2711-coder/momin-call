<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Momin Voice Call - Professional Audio Call</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-messaging-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0c0f1c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            max-width: 480px;
            width: 100%;
            margin: auto;
        }
        .card {
            background: #131725;
            border-radius: 32px;
            padding: 24px 20px;
            margin-bottom: 20px;
            border: 1px solid #2a2f45;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .badge {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7e8aa8;
            margin-bottom: 10px;
        }
        .id-box {
            background: #0a0e18;
            border-radius: 60px;
            padding: 12px 20px;
            display: inline-block;
            margin: 10px 0;
            border: 1px solid #2e8b57;
        }
        .id-number {
            font-size: 38px;
            font-weight: 800;
            font-family: monospace;
            color: #2ecc71;
            letter-spacing: 2px;
        }
        .status {
            background: #0e1322;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            display: inline-block;
            margin-top: 8px;
        }
        input {
            width: 100%;
            padding: 15px 18px;
            font-size: 17px;
            background: #0e1322;
            border: 1.5px solid #2a3048;
            border-radius: 60px;
            color: white;
            text-align: center;
            outline: none;
        }
        input:focus {
            border-color: #2ecc71;
        }
        button {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 17px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 14px;
        }
        .btn-call {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(46,204,113,0.3);
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-secondary {
            background: #2c3e50;
            color: white;
        }
        .incoming-card {
            background: #1e1a2f;
            border-radius: 28px;
            padding: 20px;
            margin: 12px 0;
            animation: pulse-ring 1s infinite;
            border-left: 4px solid #f39c12;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(243,156,18,0.5); }
            70% { box-shadow: 0 0 0 15px rgba(243,156,18,0); }
            100% { box-shadow: 0 0 0 0 rgba(243,156,18,0); }
        }
        .flex-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .flex-row button {
            margin-top: 0;
        }
        .active-call-box {
            background: #0f2a1a;
            border-radius: 32px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2ecc71;
        }
        .hidden {
            display: none;
        }
        .toast-msg {
            position: fixed;
            bottom: 25px;
            left: 20px;
            right: 20px;
            background: #1e2438e6;
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 12px 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
        }
        button:active { transform: scale(0.97); }
        .hangup-btn {
            background: #e74c3c;
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Your ID Card -->
    <div class="card">
        <div class="badge">YOUR CALLER ID</div>
        <div class="id-box">
            <span class="id-number" id="myIdDisplay">----</span>
        </div>
        <div class="status" id="connectionStatus">Online • Ready for calls</div>
    </div>

    <!-- Call Section -->
    <div class="card">
        <div class="badge">CALL A FRIEND</div>
        <input type="number" id="targetId" placeholder="Enter friend's numeric ID" autocomplete="off">
        <button class="btn-call" id="startCallBtn">START VOICE CALL</button>
    </div>

    <!-- Dynamic Call Area (incoming / active call) -->
    <div id="callManager"></div>
</div>

<script>
    // ---------- FIREBASE ----------
    const firebaseConfig = {
        apiKey: "AIzaSyBb37fIJwYNKFDLmg9BS_rnFE4SIFx5JYE",
        authDomain: "momincall-c3359.firebaseapp.com",
        projectId: "momincall-c3359",
        storageBucket: "momincall-c3359.firebasestorage.app",
        messagingSenderId: "480375844238",
        appId: "1:480375844238:web:4557a048d5ff9c3f7048df"
    };
    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    // ---------- GLOBAL VARIABLES ----------
    let peer = null;
    let localStream = null;
    let currentCall = null;
    let remoteAudio = null;
    let isInCall = false;
    let pendingIncoming = null;
    let ringtone = null;
    let ringtoneInterval = null;
    let ringVolume = 0.1;

    // Professional ringtone with crescendo effect (gradually increasing volume)
    function startProfessionalRingtone() {
        stopRingtone();
        
        ringVolume = 0.08;
        
        try {
            ringtone = new Audio('https://actions.google.com/sound/bar/office-phone-ringtone.mp3');
            if (!ringtone.canPlayType('audio/mpeg')) {
                ringtone = new Audio('https://www.soundjay.com/phone/phone-ringtone-1.mp3');
            }
        } catch(e) {
            try {
                ringtone = new Audio('https://www.ringtone-mania.com/wp-content/uploads/Classic-Phone-Ringtone.mp3');
            } catch(e2) {
                ringtone = new Audio('data:audio/mp3;base64,SUQzBAAAAAABEVRYWFgAAAAtU291bmRib3h0U29mdHdhcmUgVjIuMi4yNKqqqgAADG5lbHNlAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD/');
            }
        }
        
        ringtone.loop = true;
        ringtone.volume = ringVolume;
        
        ringtone.play().catch(e => {
            console.log("Ringtone autoplay blocked, using fallback");
            const fallbackRing = new Audio('https://www.ringtone-mania.com/demo/iphone-classic-ringtone.mp3');
            fallbackRing.loop = true;
            fallbackRing.volume = ringVolume;
            fallbackRing.play().catch(e2 => console.log);
            ringtone = fallbackRing;
        });
        
        ringtoneInterval = setInterval(() => {
            if (ringtone && ringVolume < 0.55) {
                ringVolume += 0.025;
                ringtone.volume = Math.min(ringVolume, 0.55);
            }
        }, 380);
    }
    
    function stopRingtone() {
        if (ringtoneInterval) {
            clearInterval(ringtoneInterval);
            ringtoneInterval = null;
        }
        if (ringtone) {
            ringtone.pause();
            ringtone = null;
        }
        ringVolume = 0.1;
    }

    // Helper: toast message
    function showToast(msg, duration = 2500) {
        let old = document.querySelector('.toast-msg');
        if(old) old.remove();
        let div = document.createElement('div');
        div.className = 'toast-msg';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), duration);
    }

    // Update UI based on state
    function updateUI() {
        const container = document.getElementById('callManager');
        if (!container) return;

        // Incoming call waiting
        if (pendingIncoming && !isInCall) {
            container.innerHTML = `
                <div class="incoming-card">
                    <div class="badge" style="color:#f39c12;">INCOMING CALL</div>
                    <div style="font-size: 28px; font-weight: bold; margin: 12px 0;">${pendingIncoming.callerId}</div>
                    <div class="flex-row">
                        <button id="acceptCallBtn" style="background:#2ecc71; color:white;">ACCEPT</button>
                        <button id="rejectCallBtn" style="background:#e74c3c; color:white;">REJECT</button>
                    </div>
                </div>
            `;
            document.getElementById('acceptCallBtn')?.addEventListener('click', acceptCall);
            document.getElementById('rejectCallBtn')?.addEventListener('click', rejectCall);
            return;
        }

        // Active call UI with HANG UP button
        if (isInCall && currentCall) {
            container.innerHTML = `
                <div class="active-call-box">
                    <div class="badge" style="color:#2ecc71;">LIVE CALL ACTIVE</div>
                    <div style="font-size: 20px; margin: 16px 0;">Speaking now</div>
                    <button id="hangupActiveBtn" class="hangup-btn" style="background:#e74c3c; width:100%; padding:14px; border-radius:60px; font-weight:bold;">HANG UP</button>
                </div>
            `;
            document.getElementById('hangupActiveBtn')?.addEventListener('click', () => hangupCall(true));
            return;
        }

        // No calls
        container.innerHTML = `<div style="text-align:center; padding:16px; opacity:0.6;">No active call</div>`;
    }

    // HANGUP: close everything
    async function hangupCall(showMsg = true) {
        stopRingtone();
        
        if (currentCall) {
            try { currentCall.close(); } catch(e) {}
            currentCall = null;
        }
        if (remoteAudio) {
            remoteAudio.pause();
            remoteAudio.srcObject = null;
            remoteAudio = null;
        }
        isInCall = false;
        pendingIncoming = null;
        updateUI();
        document.getElementById('connectionStatus').innerHTML = "Online • Ready for calls";
        if (showMsg) showToast("Call ended", 1200);
    }

    // Accept incoming call
    async function acceptCall() {
        if (!pendingIncoming) return;
        const callObj = pendingIncoming.call;
        
        stopRingtone();
        
        if (!localStream) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch(err) {
                showToast("Microphone permission required", 2000);
                rejectCall();
                return;
            }
        }
        
        try {
            callObj.answer(localStream);
            callObj.on('stream', (remoteStream) => {
                if (remoteAudio) {
                    remoteAudio.pause();
                    remoteAudio.srcObject = null;
                }
                const audioElem = new Audio();
                audioElem.srcObject = remoteStream;
                audioElem.autoplay = true;
                audioElem.play().catch(e => console.warn);
                remoteAudio = audioElem;
                isInCall = true;
                currentCall = callObj;
                pendingIncoming = null;
                updateUI();
                document.getElementById('connectionStatus').innerHTML = "On a call";
                showToast("Call connected!");
            });
            callObj.on('close', () => {
                hangupCall(false);
                showToast("Call ended by other person", 1500);
            });
            callObj.on('error', (err) => {
                console.error(err);
                hangupCall(true);
            });
        } catch(e) {
            showToast("Failed to answer", 1500);
            rejectCall();
        }
    }
    
    function rejectCall() {
        if (pendingIncoming) {
            try { pendingIncoming.call.close(); } catch(e) {}
            pendingIncoming = null;
        }
        stopRingtone();
        updateUI();
        showToast("Call rejected", 1200);
        document.getElementById('connectionStatus').innerHTML = "Online • Ready";
    }

    // Outgoing call
    async function makeCall(remoteNumericId) {
        if (!remoteNumericId || remoteNumericId === myNumber) {
            showToast("Invalid ID or cannot call yourself", 1500);
            return;
        }
        if (isInCall) {
            showToast("Already in a call. Hang up first.", 1500);
            return;
        }
        if (!localStream) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch(err) {
                showToast("Microphone access is required", 1800);
                return;
            }
        }
        const targetPeerId = 'momin_' + remoteNumericId;
        document.getElementById('connectionStatus').innerHTML = "Calling...";
        const call = peer.call(targetPeerId, localStream);
        currentCall = call;
        
        call.on('stream', (remoteStream) => {
            if (remoteAudio) {
                remoteAudio.pause();
                remoteAudio.srcObject = null;
            }
            const audioPlayer = new Audio();
            audioPlayer.srcObject = remoteStream;
            audioPlayer.autoplay = true;
            remoteAudio = audioPlayer;
            isInCall = true;
            updateUI();
            document.getElementById('connectionStatus').innerHTML = "Connected";
            showToast("Call started!");
        });
        call.on('close', () => {
            hangupCall(false);
            showToast("Call ended", 1300);
        });
        call.on('error', (err) => {
            console.warn(err);
            hangupCall(true);
            showToast("Call failed: person offline", 2000);
        });
        updateUI();
        // timeout 30 sec
        setTimeout(() => {
            if (currentCall && !isInCall) {
                showToast("No answer, timeout", 1800);
                hangupCall(false);
            }
        }, 30000);
    }

    // ---------- PEERJS INIT ----------
    function initPeer() {
        peer = new Peer(fullPeerId, {
            debug: 2,
            config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] }
        });
        
        peer.on('open', (id) => {
            document.getElementById('myIdDisplay').innerText = myNumber;
            document.getElementById('connectionStatus').innerHTML = "Online • Ready for calls";
            showToast("Your ID: " + myNumber, 2500);
        });
        
        peer.on('call', (incomingCall) => {
            if (isInCall) {
                incomingCall.close();
                showToast("Busy, cannot answer", 1200);
                return;
            }
            if (pendingIncoming) {
                incomingCall.close();
                return;
            }
            const callerFull = incomingCall.peer;
            const callerNumber = callerFull.replace('momin_', '');
            
            // Start professional ringtone with crescendo
            startProfessionalRingtone();
            
            if ('vibrate' in navigator) navigator.vibrate([300, 150, 300]);
            
            pendingIncoming = {
                call: incomingCall,
                callerId: callerNumber
            };
            updateUI();
            document.getElementById('connectionStatus').innerHTML = "Incoming call!";
            showToast(`Call from ${callerNumber}`, 4000);
        });
        
        peer.on('error', (err) => {
            console.error("Peer error", err);
            document.getElementById('connectionStatus').innerHTML = "Connection issue";
        });
    }

    // ---------- FCM PUSH for background/closed app ----------
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('firebase-messaging-sw.js')
            .then((reg) => {
                messaging.useServiceWorker(reg);
                Notification.requestPermission().then(perm => {
                    if (perm === 'granted') {
                        messaging.getToken({ vapidKey: 'BN0xZkQKtNvMG64UWV2p4YtWONV5NQ-6T2VzPHWr6X0W8LwzjN5y1T97JkYq3VXwFpZQxIfj7G2fA3sD4fG5hJ6kL' })
                            .then(token => console.log("FCM token:", token))
                            .catch(e => console.warn);
                    }
                });
            });
    }
    
    messaging.onMessage((payload) => {
        if (payload.data && payload.data.type === 'call_alert') {
            if (!pendingIncoming && !isInCall) {
                showToast(`Incoming call from ${payload.data.caller || 'friend'}`, 4000);
                if (!ringtone) {
                    startProfessionalRingtone();
                    setTimeout(() => { if(ringtone) stopRingtone(); }, 25000);
                }
            }
        }
    });

    // User ID (persistent)
    let myNumber = localStorage.getItem('momin_permanent_id');
    if (!myNumber) {
        myNumber = Math.floor(1000 + Math.random() * 9000).toString();
        localStorage.setItem('momin_permanent_id', myNumber);
    }
    const fullPeerId = 'momin_' + myNumber;

    // ---- Event Listeners ----
    document.getElementById('startCallBtn')?.addEventListener('click', async () => {
        const target = document.getElementById('targetId').value.trim();
        if (!target) {
            showToast("Enter friend's ID", 1200);
            return;
        }
        if (!localStream) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch(e) {
                showToast("Microphone access needed", 1800);
                return;
            }
        }
        makeCall(target);
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
        if (currentCall) currentCall.close();
        if (localStream) localStream.getTracks().forEach(track => track.stop());
        stopRingtone();
    });

    // Start everything
    initPeer();
    updateUI();
</script>
</body>
    </html>
