    <style>
        * {

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, 'Helvetica Neue', sans-serif;

        .app-container {
            max-width: 550px;

        .card {
            background: rgba(18, 22, 35, 0.9);
            backdrop-filter: blur(2px);

            padding: 24px 20px;
            margin-bottom: 20px;

        .id-display {
            background: #00000066;

        }
        .my-id-number {
            font-size: 36px;

            font-family: monospace;

        }
        .label-small {
            font-size: 13px;
            color: #b9c3db;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            font-size: 18px;
            background: #0f121f;
            border: 1.5px solid #292e42;
            border-radius: 60px;
            color: white;
            text-align: center;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #3eff9e;
            box-shadow: 0 0 8px #3eff9e55;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            border: none;
            background: #2b2f44;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }
        .btn-primary {
            background: #00e676;
            color: #0a0f1c;
            box-shadow: 0 4px 12px rgba(0,230,118,0.3);
            font-weight: 800;
        }
        .btn-primary:hover {
            background: #2eff92;
            transform: scale(0.98);
        }
        .btn-danger {
            background: #e53e3e;

        }
        .btn-secondary {
            background: #2d3748;
        }
        .call-panel {
            background: #11141f;

        .incoming-card {
            background: #1e1b2b;

            animation: pulse 1.2s infinite;
            border: 1px solid #ffb347;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 180, 71, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(255, 180, 71, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 180, 71, 0); }
        }
        .flex-buttons {
            display: flex;

        }
        .status-text {
            font-size: 15px;

        }
        .hidden {
            display: none;
        }
        button:active {

        }
        .hangup-btn {
            background: #c52828;

        }
        .toast-msg {
            position: fixed;
            bottom: 25px;

            right: 20px;
            background: #1f2937dd;
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 12px 20px;
            text-align: center;
            font-weight: 500;
            z-index: 1000;

</head>
<body>
<div class="app-container">

    <div class="card">
        <div class="badge">🔰 YOUR CALLER ID</div>

    </div>

    <!-- Outgoing Call Section -->
    <div class="card">
        <div class="badge">📞 CALL A FRIEND</div>
        <input type="number" id="target-id" placeholder="Enter friend's numeric ID" autocomplete="off">
        <button class="btn btn-primary" id="start-call-btn">🔊 START VOICE CALL</button>
    </div>

    <!-- Active Call & Incoming UI (dynamic) -->
    <div id="call-management-area"></div>
</div>

<script>
    // ---------- FIREBASE CONFIG ----------
    const firebaseConfig = {
        apiKey: "AIzaSyBb37fIJwYNKFDLmg9BS_rnFE4SIFx5JYE",
        authDomain: "momincall-c3359.firebaseapp.com",
        projectId: "momincall-c3359",
        storageBucket: "momincall-c3359.firebasestorage.app",
        messagingSenderId: "480375844238",
        appId: "1:480375844238:web:4557a048d5ff9c3f7048df"
    };
    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    // ---------- GLOBALS ----------
    let peer = null;
    let localStream = null;          // our microphone stream
    let currentCall = null;           // active PeerJS call object
    let currentAudio = null;          // audio element for remote stream
    let isInCall = false;
    let incomingCallRequest = null;    // store incoming call object before answer
    let ringtoneAudio = null;          // ringtone for incoming calls

    // User ID management (persistent numeric ID)
    let myNumericId = localStorage.getItem('momin_permanent_id');
    if (!myNumericId) {
        myNumericId = Math.floor(1000 + Math.random() * 9000).toString();
        localStorage.setItem('momin_permanent_id', myNumericId);
    }
    const fullPeerId = 'momin_' + myNumericId;   // peerjs id prefix

    // Helper: show temporary message
    function showToast(msg, duration = 2500) {
        let existingToast = document.querySelector('.toast-msg');
        if(existingToast) existingToast.remove();
        let div = document.createElement('div');
        div.className = 'toast-msg';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => { if(div) div.remove(); }, duration);
    }

    // Stop current call & cleanup fully (close remote audio, stop streams, release)
    async function hangupCall(showMsg = true) {
        if (ringtoneAudio) {
            ringtoneAudio.pause();
            ringtoneAudio = null;
        }
        if (currentCall) {
            try {
                currentCall.close();
            } catch(e) {}
            currentCall = null;
        }
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.srcObject = null;
            currentAudio = null;
        }
        if (localStream) {
            // we keep local stream alive for next calls, but we stop all tracks? Actually we should not destroy it, but we can keep it.
            // However, if we need fresh stream after call, we keep it. but for hangup, we just close remote part.
        }
        isInCall = false;
        incomingCallRequest = null;
        updateCallUi();
        if (showMsg) showToast("📴 Call ended", 1500);
        document.getElementById('connection-status').innerHTML = "🟢 Ready for calls";
    }

    // Create or update the active call UI
    function updateCallUi() {
        const container = document.getElementById('call-management-area');
        if (!container) return;
        // If there is an incoming call request (waiting for user decision)
        if (incomingCallRequest && !isInCall) {
            container.innerHTML = `
                <div class="incoming-card">
                    <div class="badge" style="color:#ffbc6e;">📲 INCOMING CALL</div>
                    <div style="font-size: 22px; margin: 12px 0;">🔔 ${incomingCallRequest.callerId || "Friend"} is calling...</div>
                    <div class="flex-buttons">
                        <button id="acceptCallBtn" class="btn btn-primary" style="background:#00e676;">✅ Accept</button>
                        <button id="rejectCallBtn" class="btn btn-danger" style="background:#b91c1c;">❌ Reject</button>
                    </div>
                </div>
            `;
            const acceptBtn = document.getElementById('acceptCallBtn');
            const rejectBtn = document.getElementById('rejectCallBtn');
            if (acceptBtn) acceptBtn.onclick = () => acceptIncomingCall();
            if (rejectBtn) rejectBtn.onclick = () => rejectIncomingCall();
            return;
        }
        
        if (isInCall && currentCall) {
            container.innerHTML = `
                <div class="call-panel">
                    <div class="badge" style="color:#3eff9e;">🎙️ ACTIVE VOICE CALL</div>
                    <div style="font-weight:bold; font-size: 19px; margin: 12px 0;">🔊 Call in progress</div>
                    <button id="hangupActiveBtn" class="btn btn-danger hangup-btn">⛔ Hang Up</button>
                </div>
            `;
            const hangBtn = document.getElementById('hangupActiveBtn');
            if (hangBtn) hangBtn.onclick = () => { hangupCall(true); };
            return;
        }
        // no call, no incoming
        container.innerHTML = `<div style="text-align:center; opacity:0.7; padding:10px;">✨ No active call</div>`;
    }

    // Accept incoming call
    async function acceptIncomingCall() {
        if (!incomingCallRequest) return;
        const callObj = incomingCallRequest.call;
        const callerIdDisplay = incomingCallRequest.callerId;
        
        // stop ringing
        if (ringtoneAudio) {
            ringtoneAudio.pause();
            ringtoneAudio = null;
        }
        
        // get microphone access if not already
        if (!localStream) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (err) {
                showToast("⚠️ Microphone permission needed", 2000);
                rejectIncomingCall();
                return;
            }
        }
        
        // answer the call with our stream
        try {
            callObj.answer(localStream);
            // handle remote stream
            callObj.on('stream', (remoteStream) => {
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio.srcObject = null;
                }
                const audioElem = new Audio();
                audioElem.srcObject = remoteStream;
                audioElem.autoplay = true;
                audioElem.play().catch(e=>console.warn);
                currentAudio = audioElem;
                isInCall = true;
                currentCall = callObj;
                incomingCallRequest = null;
                updateCallUi();
                showToast("✅ Call connected", 1200);
                document.getElementById('connection-status').innerHTML = "📞 On call";
            });
            callObj.on('close', () => {
                hangupCall(false);
                showToast("📞 Call ended by other side", 1500);
            });
            callObj.on('error', (err) => { console.error(err); hangupCall(true); });
        } catch(e) {
            showToast("Failed to answer call", 1500);
            rejectIncomingCall();
        }
    }
    
    function rejectIncomingCall() {
        if (incomingCallRequest) {
            try {
                if (incomingCallRequest.call) incomingCallRequest.call.close();
            } catch(e) {}
            incomingCallRequest = null;
        }
        if (ringtoneAudio) {
            ringtoneAudio.pause();
            ringtoneAudio = null;
        }
        updateCallUi();
        showToast("📵 Call rejected", 1200);
    }

    // Making outgoing call
    async function makeCallToRemote(remoteNumericId) {
        if (!remoteNumericId || remoteNumericId === myNumericId) {
            showToast("❌ Invalid ID or can't call yourself", 1500);
            return;
        }
        if (isInCall) {
            showToast("⚠️ Already in a call. Hang up first.", 1500);
            return;
        }
        // make sure we have microphone
        if (!localStream) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (err) {
                showToast("🎤 Microphone access required", 1800);
                return;
            }
        }
        const targetPeerId = 'momin_' + remoteNumericId;
        // show connecting status
        document.getElementById('connection-status').innerHTML = "📡 Calling...";
        const call = peer.call(targetPeerId, localStream);
        currentCall = call;
        
        call.on('stream', (remoteStream) => {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.srcObject = null;
            }
            const audioElem = new Audio();
            audioElem.srcObject = remoteStream;
            audioElem.autoplay = true;
            audioElem.play().catch(e=>console.warn);
            currentAudio = audioElem;
            isInCall = true;
            updateCallUi();
            document.getElementById('connection-status').innerHTML = "📞 Connected";
            showToast("Call started!", 1000);
        });
        call.on('close', () => {
            hangupCall(false);
            showToast("Call ended", 1200);
        });
        call.on('error', (err) => {
            console.error(err);
            hangupCall(true);
            showToast("Call failed: peer may be offline", 2000);
        });
        updateCallUi();
        // timeout after 25 sec if not connected
        setTimeout(() => {
            if (currentCall && !isInCall) {
                showToast("No answer or timeout", 1800);
                hangupCall(false);
            }
        }, 25000);
    }

    // ---------- PEERJS INIT with retry + FCM foreground ----------
    function initPeer() {
        peer = new Peer(fullPeerId, {
            debug: 2,
            config: {'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]}
        });
        peer.on('open', (id) => {
            console.log("PeerJS open ID:", id);
            const numericPart = id.replace('momin_', '');
            document.getElementById('my-id-text').innerText = numericPart;
            document.getElementById('connection-status').innerHTML = "🟢 Ready for calls";
            showToast("✅ Your ID: " + numericPart, 2500);
        });
        peer.on('error', (err) => {
            console.error("Peer error", err);
            if(err.type === 'peer-unavailable') {
                showToast("Friend is offline or ID invalid", 2000);
                if(currentCall && !isInCall) hangupCall(false);
            } else {
                showToast("Network issue, reconnecting...", 2000);
            }
            document.getElementById('connection-status').innerHTML = "⚠️ Connection issue";
        });
        peer.on('call', (incomingCall) => {
            // If already in a call, reject automatically
            if (isInCall) {
                showToast("Busy, can't answer new call", 1500);
                incomingCall.close();
                return;
            }
            const remotePeerId = incomingCall.peer; // full id like momin_1234
            let callerNumber = remotePeerId.replace('momin_', '');
            // check if incoming call already pending? avoid duplicate
            if (incomingCallRequest) {
                incomingCall.close();
                return;
            }
            // play ringtone (web audio)
            if (ringtoneAudio) {
                ringtoneAudio.pause();
                ringtoneAudio = null;
            }
            try {
                ringtoneAudio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
                ringtoneAudio.loop = true;
                ringtoneAudio.volume = 0.5;
                ringtoneAudio.play().catch(e=>console.log("ringtone autoplay blocked, user interaction needed"));
            } catch(e) {}
            // create incoming request object
            incomingCallRequest = {
                call: incomingCall,
                callerId: callerNumber
            };
            // trigger UI update & vibration if supported
            if ('vibrate' in navigator) navigator.vibrate(400);
            updateCallUi();
            showToast(`📞 Incoming call from ${callerNumber}!`, 5000);
            document.getElementById('connection-status').innerHTML = "🔔 Incoming call ...";
        });
    }

    // ----- FIREBASE MESSAGING (Push) for background/closed app ring -----
    // Request permission & get token, then send notification to callee via FCM using localStorage as mock?
    // Since real backend not provided, we implement full foreground notification + service worker based ring.
    // For actual push when app closed, we need server to send FCM. But we will implement complete push handling
    // that triggers ring via service worker even if browser closed? Actually we need to register service worker,
    // and when a call begins, we would need backend to send notification. Since backend not included, we simulate
    // but to make truly 'app closed also ring', we will store FCM token and demo trigger via external API? But no server.
    // Alternative: implement PeerJS data channel to send 'call-request' but that requires both online.
    // To meet requirement "application closed also ring if someone calls", we fully integrate firebase messaging with service worker.
    // Since we have manifest & sw -> we can receive push notifications from firebase.
    // However for actual calling we need to wake up peerJS? The feature: When app is closed, a push notification appears,
    // user clicks and opens app, then call connects via webrtc. We will implement this. Additionally, if app is in background,
    // show notification with sound.
    
    // Register service worker (already in manifest + custom sw)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('firebase-messaging-sw.js')
            .then((registration) => {
                console.log("SW registered:", registration);
                messaging.useServiceWorker(registration);
