<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momin Voice Call Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-messaging.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #fff; text-align: center; padding: 20px; }
        .box { background: #151515; border-radius: 12px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .id-text { color: #00FF00; font-size: 32px; font-weight: bold; margin: 10px 0; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #222; color: #fff; text-align: center; }
        .btn { width: 85%; padding: 15px; border-radius: 8px; border: none; font-size: 18px; font-weight: bold; background: #00FF00; color: #000; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Momin Voice Call</h2>
    <div class="box">
        <p>YOUR ID</p>
        <div id="my-id" class="id-text">Connecting...</div>
    </div>
    <div class="box">
        <input type="number" id="remote-id" placeholder="Enter Friend's ID">
        <button class="btn" onclick="makeCall()">Start Call</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBb37fIJwYNKFDLmg9BS_rnFE4SIFx5JYE",
            authDomain: "momincall-c3359.firebaseapp.com",
            projectId: "momincall-c3359",
            storageBucket: "momincall-c3359.firebasestorage.app",
            messagingSenderId: "480375844238",
            appId: "1:480375844238:web:4557a048d5ff9c3f7048df"
        };
        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        let myId = localStorage.getItem('momin_id') || Math.floor(1000 + Math.random() * 9000).toString();
        localStorage.setItem('momin_id', myId);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('firebase-messaging-sw.js').then((reg) => {
                messaging.useServiceWorker(reg);
            });
        }

        const peer = new Peer('momin-' + myId);
        peer.on('open', (id) => { document.getElementById('my-id').innerText = id.replace('momin-', ''); });

        peer.on('call', (call) => {
            if(confirm("Incoming Call! Answer?")) {
                navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                    call.answer(stream);
                    call.on('stream', (s) => { const a = new Audio(); a.srcObject = s; a.play(); });
                });
            }
        });

        function makeCall() {
            const rid = document.getElementById('remote-id').value;
            if(!rid) return;
            navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                const call = peer.call('momin-' + rid, stream);
                call.on('stream', (s) => { const a = new Audio(); a.srcObject = s; a.play(); });
            });
        }
    </script>
</body>
</html>
