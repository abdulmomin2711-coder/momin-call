<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Momin Call</title>
    <style>
        body { background: #000; color: #fff; text-align: center; padding: 20px; font-family: Arial; }
        #display { font-size: 14px; margin-top: 20px; color: #0f0; word-wrap: break-word; font-weight: bold; }
        input { width: 85%; padding: 12px; margin-top: 25px; border-radius: 5px; border: 1px solid #0f0; background: #222; color: #fff; }
        button { width: 90%; padding: 12px; margin-top: 15px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .label { font-size: 12px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>Momin Call</h3>
    
    <div class="label">YOUR UNIQUE ID:</div>
    <div id="display">Connecting to network...</div>
    
    <input type="text" id="peerId" placeholder="Paste Friend ID Here">
    <br>
    <button id="callBtn">Start Call</button>

    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="app.js"></script>
    
    <script src="https://api.kaiads.com/v1/sdk.js"></script>
    <script>
      getKaiAd({
        publisher: '1799561b-0084-4b48-89e4-2528e5dfd51f',
        app: 'momin-call',
        slot: 'main',
        onerror: err => console.error('Ad error:', err),
        onready: ad => {
          ad.call('display')
        }
      });
    </script>
</body>
</html>
