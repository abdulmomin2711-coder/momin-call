<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Momin Voice Call - ইমো স্টাইল</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-messaging.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1122 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            margin: auto;
        }
        .card {
            background: rgba(18, 25, 45, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 28px 22px;
            margin-bottom: 22px;
            border: 1px solid rgba(0, 255, 136, 0.25);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.6);
            transition: all 0.2s;
        }
        .badge {
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #8e9bbe;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .id-wrapper {
            background: #00000055;
            border-radius: 60px;
            padding: 10px 20px;
            display: inline-block;
            margin: 12px 0;
            border: 1px solid #2a6e3a;
        }
        .my-id {
            font-size: 40px;
            font-weight: 800;
            font-family: monospace;
            color: #00ff9d;
            text-shadow: 0 0 8px #00aa55;
            letter-spacing: 3px;
        }
        .sub-text {
            font-size: 13px;
            color: #a7b4d4;
            margin: 8px 0;
        }
        .status-chip {
            background: #0f1422;
            padding: 6px 16px;
            border-radius: 50px;
            display: inline-block;
            font-size: 13px;
            font-weight: 500;
            margin-top: 8px;
        }
        input {
            width: 100%;
            padding: 16px 20px;
            font-size: 18px;
            background: #0b1020;
            border: 1.5px solid #2a2f48;
            border-radius: 60px;
            color: white;
            text-align: center;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #00ff9d;
            box-shadow: 0 0 12px #00ff9d33;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            border: none;
            background: #242a44;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 14px;
        }
        .btn-call {
            background: linear-gradient(95deg, #00d26a, #00ff9d);
            color: #000;
            font-weight: 800;
            box-shadow: 0 6px 14px rgba(0, 210, 106, 0.3);
        }
        .btn-danger {
            background: #de3c4b;
            color: white;
        }
        .btn-secondary {
            background: #1e2a3a;
        }
        .incoming-box {
            background: #2a1f2e;
            border-radius: 36px;
            padding: 20px;
            margin-top: 10px;
            animation: ringPulse 1.1s infinite;
            border-left: 5px solid #ffb347;
        }
        @keyframes ringPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 170, 70, 0.5); }
            70% { box-shadow: 0 0 0 18px rgba(255, 170, 70, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 170, 70, 0); }
        }
        .flex-two {
            display: flex;
            gap: 14px;
            margin-top: 18px;
        }
        .flex-two .btn {
            margin-top: 0;
        }
        .call-active-panel {
            background: #102a1a;
            border-radius: 38px;
            padding: 20px;
            text-align: center;
            border: 1px solid #3eff9e;
        }
        .hidden {
            display: none;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e293be6;
            backdrop-filter: blur(12px);
            border-radius: 100px;
            padding: 12px 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            border-left: 4px solid #00ff9d;
        }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>
<div class="container">
    <!-- নিজের আইডি কার্ড -->
    <div class="card">
        <div class="badge">📡 তোমার কলিং আইডি</div>
        <div class="id-wrapper">
            <span class="my-id" id="displayMyId">----</span>
        </div>
        <div class="sub-text">✨ বন্ধুকে এই আইডি দাও, কল করতে পারবে</div>
        <div class="status-chip" id="globalStatus">🟢 অনলাইন • কলের জন্য প্রস্তুত</div>
    </div>

    <!-- কল করার সেকশন -->
    <div class="card">
        <div class="badge">📞 বন্ধুকে কল দাও</div>
        <input type="number" id="friendIdInput" placeholder="বন্ধুর নাম্বার আইডি লিখুন" autocomplete="off">
        <button class="btn btn-call" id="callBtn">🔊 ভয়েস কল শুরু করুন</button>
    </div>

    <!-- কল ম্যানেজমেন্ট এরিয়া (ইনকামিং / এক্টিভ কল) -->
    <div id="callArea"></div>
</div>

<script>
    // ------------------- FIREBASE কনফিগ (আপনার প্রোজেক্ট) ------------------
    const firebaseConfig = {
        apiKey: "AIzaSyBb37fIJwYNKFDLmg9BS_rnFE4SIFx5JYE",
        authDomain: "momincall-c3359.firebaseapp.com",
        projectId: "momincall-c3359",
        storageBucket: "momincall-c3359.firebasestorage.app",
        messagingSenderId: "480375844238",
        appId: "1:480375844238:web:4557a048d5ff9c3f7048df"
    };
    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    // ------------------- গ্লোবাল ভেরিয়েবল ------------------
    let peer = null;
    let myStream = null;          // নিজের মাইক্রোফোন
    let activeCall = null;        // এক্টিভ PeerJS কল অবজেক্ট
    let remoteAudio = null;       // রিমোট সাউন্ড প্লেয়ার
    let isCallActive = false;
    let incomingCallData = null;   // ইনকামিং কল সংরক্ষণ
    let ringTone = null;

    // ইউজার আইডি (পার্মানেন্ট)
    let myNumber = localStorage.getItem('momin_call_id');
    if (!myNumber) {
        myNumber = Math.floor(1000 + Math.random() * 9000).toString();
        localStorage.setItem('momin_call_id', myNumber);
    }
    const fullPeerId = `momin_${myNumber}`;

    // টোস্ট মেসেজ ফাংশন
    function showMessage(msg, duration = 2700) {
        let oldToast = document.querySelector('.toast');
        if(oldToast) oldToast.remove();
        let toastDiv = document.createElement('div');
        toastDiv.className = 'toast';
        toastDiv.innerText = msg;
        document.body.appendChild(toastDiv);
        setTimeout(() => toastDiv.remove(), duration);
    }

    // কল ক্লিনআপ (হাং আপ)
    async function endCall(showMsg = true) {
        if (ringTone) { ringTone.pause(); ringTone = null; }
        if (activeCall) {
            try { activeCall.close(); } catch(e) {}
            activeCall = null;
        }
        if (remoteAudio) {
            remoteAudio.pause();
            remoteAudio.srcObject = null;
            remoteAudio = null;
        }
        isCallActive = false;
        incomingCallData = null;
        updateCallInterface();
        if (showMsg) showMessage("📴 কল শেষ হয়েছে", 1200);
        document.getElementById('globalStatus').innerHTML = "🟢 রেডি • কল দিতে পারো";
    }

    // UI আপডেট (ইনকামিং / এক্টিভ কল)
    function updateCallInterface() {
        const area = document.getElementById('callArea');
        if (!area) return;
        
        // যদি ইনকামিং কল থাকে
        if (incomingCallData && !isCallActive) {
            area.innerHTML = `
                <div class="incoming-box">
                    <div class="badge" style="color:#ffbc6e;">📞 ইনকামিং কল</div>
                    <div style="font-size: 26px; font-weight: bold; margin: 12px 0;">🔔 ${incomingCallData.callerId}</div>
                    <div class="flex-two">
                        <button id="acceptCallBtn" class="btn btn-call" style="background:#00c96b;">✅ রিসিভ করো</button>
                        <button id="declineCallBtn" class="btn btn-danger" style="background:#a1222a;">❌ রিজেক্ট</button>
                    </div>
                </div>
            `;
            document.getElementById('acceptCallBtn')?.addEventListener('click', () => acceptIncoming());
            document.getElementById('declineCallBtn')?.addEventListener('click', () => rejectIncomingCall());
            return;
        }
        
        // এক্টিভ কল থাকলে
        if (isCallActive && activeCall) {
            area.innerHTML = `
                <div class="call-active-panel">
                    <div class="badge">🎙️ লাইভ কল চলছে</div>
                    <div style="font-size: 22px; margin: 12px 0;">🔊 কথা বলছেন</div>
                    <button id="hangupBtn" class="btn btn-danger" style="background:#c52828;">⛔ কল কেটে দাও</button>
                </div>
            `;
            document.getElementById('hangupBtn')?.addEventListener('click', () => endCall(true));
            return;
        }
        
        // ডিফল্ট (কোন কল নেই)
        area.innerHTML = `<div style="text-align:center; padding:15px; opacity:0.6;">✨ কোনো কল নেই</div>`;
    }

    // ইনকামিং কল অ্যাকসেপ্ট
    async function acceptIncoming() {
        if (!incomingCallData) return;
        const callObj = incomingCallData.call;
        if (ringTone) { ringTone.pause(); ringTone = null; }
        
        if (!myStream) {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch(err) {
                showMessage("মাইক্রোফোন অনুমতি দরকার!", 2000);
                rejectIncomingCall();
                return;
            }
        }
        
        try {
            callObj.answer(myStream);
            callObj.on('stream', (remoteStream) => {
                if (remoteAudio) {
                    remoteAudio.pause();
                    remoteAudio.srcObject = null;
                }
                const audioEl = new Audio();
                audioEl.srcObject = remoteStream;
                audioEl.autoplay = true;
                audioEl.play().catch(e => console.warn);
                remoteAudio = audioEl;
                isCallActive = true;
                activeCall = callObj;
                incomingCallData = null;
                updateCallInterface();
                document.getElementById('globalStatus').innerHTML = "📞 কল চলছে...";
                showMessage("✅ কল সংযোগ হয়েছে", 1200);
            });
            callObj.on('close', () => {
                endCall(false);
                showMessage("অন্য প্রান্ত থেকে কল কাটা হয়েছে", 1500);
            });
            callObj.on('error', () => endCall(true));
        } catch(e) {
            showMessage("কল রিসিভ করতে ব্যর্থ", 1500);
            rejectIncomingCall();
        }
    }
    
    function rejectIncomingCall() {
        if (incomingCallData) {
            try { incomingCallData.call.close(); } catch(e) {}
            incomingCallData = null;
        }
        if (ringTone) { ringTone.pause(); ringTone = null; }
        updateCallInterface();
        showMessage("📵 কল রিজেক্ট করা হয়েছে", 1200);
        document.getElementById('globalStatus').innerHTML = "🟢 অনলাইন";
    }

    // বাইরে কল করার ফাংশন
    async function startOutgoingCall(remoteNumericId) {
        if (!remoteNumericId || remoteNumericId === myNumber) {
            showMessage("নিজের আইডি ছাড়া বৈধ নম্বর দিন", 1500);
            return;
        }
        if (isCallActive) {
            showMessage("আগে কল শেষ করুন", 1300);
            return;
        }
        if (!myStream) {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch(err) {
                showMessage("মাইক্রোফোন অনুমতি দিন", 1800);
                return;
            }
        }
        const targetPeer = `momin_${remoteNumericId}`;
        document.getElementById('globalStatus').innerHTML = "📡 কল সংযোগ হচ্ছে...";
        const call = peer.call(targetPeer, myStream);
        activeCall = call;
        
        call.on('stream', (remoteStream) => {
            if (remoteAudio) {
                remoteAudio.pause();
                remoteAudio.srcObject = null;
            }
            const audioPlayer = new Audio();
            audioPlayer.srcObject = remoteStream;
            audioPlayer.autoplay = true;
            remoteAudio = audioPlayer;
            isCallActive = true;
            updateCallInterface();
            document.getElementById('globalStatus').innerHTML = "🎙️ কল চলছে";
            showMessage("কল সংযুক্ত!", 1000);
        });
        call.on('close', () => {
            endCall(false);
            showMessage("কল সংযোগ বিচ্ছিন্ন", 1400);
        });
        call.on('error', (err) => {
            console.error(err);
            endCall(true);
            showMessage("কল ব্যর্থ: ইউজার অফলাইন", 2000);
        });
        updateCallInterface();
        // 25 সেকেন্ড টাইমআউট
        setTimeout(() => {
            if (activeCall && !isCallActive) {
                showMessage("কোনো সাড়া নেই", 1500);
                endCall(false);
            }
        }, 25000);
    }

    // ---------- PEERJS ইনিশিয়ালাইজ ----------
    function initPeerConnection() {
        peer = new Peer(fullPeerId, {
            debug: 2,
            config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] }
        });
        peer.on('open', () => {
            document.getElementById('displayMyId').innerText = myNumber;
            document.getElementById('globalStatus').innerHTML = "🟢 অনলাইন • কল নিতে প্রস্তুত";
            showMessage(`তোমার আইডি: ${myNumber}`, 2500);
        });
        peer.on('call', (incoming) => {
            if (isCallActive) {
                incoming.close();
                showMessage("ব্যস্ত, কল নেয়া যাচ্ছে না", 1200);
                return;
            }
            const callerFullId = incoming.peer;
            const callerNumber = callerFullId.replace('momin_', '');
            if (incomingCallData) {
                incoming.close();
                return;
            }
            // রিং সাউন্ড
            if (ringTone) ringTone.pause();
            try {
                ringTone = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
                ringTone.loop = true;
                ringTone.volume = 0.45;
                ringTone.play().catch(e => console.log);
            } catch(e) {}
            if ('vibrate' in navigator) navigator.vibrate(400);
            incomingCallData = {
                call: incoming,
                callerId: callerNumber
            };
            updateCallInterface();
            document.getElementById('globalStatus').innerHTML = "🔔 ইনকামিং কল! রিসিভ করো";
            showMessage(`📞 কল আসছে ${callerNumber} থেকে`, 4000);
        });
        peer.on('error', (err) => {
            console.warn(err);
            document.getElementById('globalStatus').innerHTML = "⚠️ সংযোগ সমস্যা";
        });
    }

    // ---------- FCM ও পুশ নোটিফিকেশন (অ্যাপ বন্ধ থাকলেও রিং) ----------
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('firebase-messaging-sw.js')
            .then((reg) => {
                messaging.useServiceWorker(reg);
                Notification.requestPermission().then(perm => {
                    if (perm === 'granted') {
                        messaging.getToken({ vapidKey: 'BN0xZkQKtNvMG64UWV2p4YtWONV5NQ-6T2VzPHWr6X0W8LwzjN5y1T97JkYq3VXwFpZQxIfj7G2fA3sD4fG5hJ6kL' })
                            .then(token => localStorage.setItem('fcm_token', token))
                            .catch(e=>console.warn);
                    }
                });
            });
    }
    // ফোরগ্রাউন্ড মেসেজ লিসেন
    messaging.onMessage((payload) => {
        if(payload.data && payload.data.type === 'call_request') {
            if (!incomingCallData && !isCallActive) {
                showMessage(`📣 কল আসছে ${payload.data.caller_id || 'বন্ধু'} থেকে`, 4000);
                if(!ringTone){
                    let r = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3');
                    r.loop = true; r.volume = 0.3; r.play().catch(e=>{});
                    ringTone = r;
                    setTimeout(()=>{ if(ringTone===r){ r.pause(); ringTone=null;}}, 20000);
                }
            }
        }
    });

    // UI বাটন ইভেন্ট
    document.getElementById('callBtn')?.addEventListener('click', async () => {
        const friendId = document.getElementById('friendIdInput').value.trim();
        if (!friendId) { showMessage("বন্ধুর আইডি লিখুন", 1200); return; }
        if (!myStream) {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch(e) {
                showMessage("মাইক্রোফোন এক্সেস দিন", 2000);
                return;
            }
        }
        startOutgoingCall(friendId);
    });

    // ক্লিনআপ
    window.addEventListener('beforeunload', () => {
        if (activeCall) activeCall.close();
        if (myStream) myStream.getTracks().forEach(t => t.stop());
        if (ringTone) ringTone.pause();
    });

    initPeerConnection();
    updateCallInterface();
    console.log("মমিন ভয়েস কল প্রস্তুত - ইমো স্টাইল");
</script>
</body>
    </html>
